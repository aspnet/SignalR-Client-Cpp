variables:
  # used for SDL and arcade
  - name: _TeamName
    value: AspNetCore
  - name: _DotNetPublishToBlobFeed
    value: true
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
    value: true
  - name: _PublishUsingPipelines
    value: true
  - name: _DotNetArtifactsCategory
    value: SIGNALR_CPP
  - name: _DotNetValidationArtifactsCategory
    value: SIGNALR_CPP
  - name: Build.Repository.Clean
    value: true
  - name: _BuildConfig
    value: 'Debug'
  - template: /eng/common/templates-official/variables/pool-providers.yml@self

trigger:
- main

schedules:
# Cron timezone is UTC.
# Run once a month
- cron: "0 0 1 * *"
  branches:
    include:
    - main
  always: true


resources:
  repositories:
  # Repo: 1ESPipelineTemplates/1ESPipelineTemplates
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    sdl:
      policheck:
        enabled: true
      tsa:
        enabled: true
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: windows.vs2022.amd64
        os: windows
    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: .azure/default-build.yml@self
        parameters:
          agentOs: Windows
          jobName: Windows_Build_Test_With_CppRestSDK
          useCppRestSDK: true
          cMakeRunArgs: '-A x64'
          beforeBuild:
          - powershell: |
              $vcpkgRoot = $env:VCPKG_ROOT
              if (-not $vcpkgRoot -and $env:VCPKG_INSTALLATION_ROOT) { $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT }
              if (-not $vcpkgRoot) {
                $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
                $vsPath = & $vswhere -latest -prerelease -property installationPath
                if ($vsPath) { $vcpkgRoot = Join-Path $vsPath 'VC\vcpkg' }
              }
              if (-not $vcpkgRoot -or -not (Test-Path $vcpkgRoot)) { Write-Error "Could not locate vcpkg"; exit 1 }
              if (-not (Test-Path (Join-Path $vcpkgRoot 'vcpkg.exe'))) { & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') }
              Write-Host "##vso[task.setvariable variable=VCPKG_ROOT]$vcpkgRoot"
            displayName: Set VCPKG_ROOT
          - powershell: '& "$env:VCPKG_ROOT\vcpkg.exe" install cpprestsdk:x64-windows msgpack:x64-windows jsoncpp:x64-windows'
            displayName: vcpkg install dependencies

      - template: .azure/default-build.yml@self
        parameters:
          agentOs: macOs
          jobName: Mac_Build_Test_With_CppRestSDK
          useCppRestSDK: true
          beforeBuild:
          - bash: echo "##vso[task.setvariable variable=VCPKG_ROOT]$VCPKG_INSTALLATION_ROOT"
            displayName: Set VCPKG_ROOT
          - bash: '"$VCPKG_ROOT/vcpkg" install cpprestsdk msgpack jsoncpp'
            displayName: vcpkg install dependencies

      - template: .azure/default-build.yml@self
        parameters:
          agentOs: Linux
          jobName: Linux_Build_Test_With_CppRestSDK
          useCppRestSDK: true
          beforeBuild:
          - bash: '"$VCPKG_ROOT/vcpkg" install cpprestsdk boost-system boost-chrono boost-thread msgpack jsoncpp'
            displayName: vcpkg install dependencies
          - bash: "sudo apt-get update && sudo apt install valgrind"
            displayName: install valgrind

      - template: .azure/default-build.yml@self
        parameters:
          agentOs: Linux
          jobName: Linux_Build_Test
          useCppRestSDK: false
          beforeBuild:
          - bash: '"$VCPKG_ROOT/vcpkg" install msgpack jsoncpp'
            displayName: vcpkg install dependencies
          - bash: "sudo apt-get update && sudo apt install valgrind"
            displayName: install valgrind

      - template: .azure/default-build.yml@self
        parameters:
          agentOs: Windows
          jobName: Windows_Build_Test
          useCppRestSDK: false
          cMakeRunArgs: '-A x64'
          beforeBuild:
          - powershell: |
              $vcpkgRoot = $env:VCPKG_ROOT
              if (-not $vcpkgRoot -and $env:VCPKG_INSTALLATION_ROOT) { $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT }
              if (-not $vcpkgRoot) {
                $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
                $vsPath = & $vswhere -latest -prerelease -property installationPath
                if ($vsPath) { $vcpkgRoot = Join-Path $vsPath 'VC\vcpkg' }
              }
              if (-not $vcpkgRoot -or -not (Test-Path $vcpkgRoot)) { Write-Error "Could not locate vcpkg"; exit 1 }
              if (-not (Test-Path (Join-Path $vcpkgRoot 'vcpkg.exe'))) { & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') }
              Write-Host "##vso[task.setvariable variable=VCPKG_ROOT]$vcpkgRoot"
            displayName: Set VCPKG_ROOT
          - powershell: '& "$env:VCPKG_ROOT\vcpkg.exe" install msgpack:x64-windows jsoncpp:x64-windows'
            displayName: vcpkg install dependencies

      - template: .azure/default-build.yml@self
        parameters:
          agentOs: macOs
          jobName: Mac_Build_Test
          useCppRestSDK: false
          beforeBuild:
          - bash: echo "##vso[task.setvariable variable=VCPKG_ROOT]$VCPKG_INSTALLATION_ROOT"
            displayName: Set VCPKG_ROOT
          - script: brew install gcc
            displayName: Install gcc
          - bash: '"$VCPKG_ROOT/vcpkg" install msgpack jsoncpp'
            displayName: vcpkg install dependencies
