parameters:
  agentOs: 'Windows'
  poolVmImage: ''
  dependsOn: ''
  beforeBuild: []
  afterBuild: []
  timeoutInMinutes: 60
  cMakeRunArgs: ''
  configuration: 'Release'
  useCppRestSDK: true
  gtestFlags: '--gtest_output=xml:$(Build.ArtifactStagingDirectory)/testOut/'

jobs:
- ${{ if ne(variables['System.TeamProject'], 'internal') }}:
  - template: /eng/common/templates/job/job.yml@self
    parameters:
      name: ${{ coalesce(parameters.jobName, parameters.agentOs) }}
      displayName: ${{ coalesce(parameters.jobName, parameters.agentOs) }}
      dependsOn: ${{ parameters.dependsOn }}
      timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
      enablePublishBuildAssets: false
      enablePublishTestResults: true # publish test results to AzDO (populates AzDO Tests tab)
      enableTelemetry: true
      pool:
        ${{ if eq(parameters.agentOs, 'macOS') }}:
          vmImage: macOS-latest
        ${{ if eq(parameters.agentOs, 'Linux') }}:
          vmImage: ubuntu-latest
        ${{ if eq(parameters.agentOs, 'Windows') }}:
          name: $(DncEngPublicBuildPool)
          image: 1es-windows-2022-open
          os: windows
      steps:
      - checkout: self
        clean: true

      - ${{ parameters.beforeBuild }}

      # The machine-provided vcpkg is a shallow clone that may not contain the
      # builtin-baseline pinned in vcpkg.json (cpprestsdk was deindexed from tip,
      # so we pin to the commit before its removal). Deepen the clone so manifest
      # restore can resolve the baseline and the removed port from history.
      - ${{ if eq(parameters.agentOs, 'Windows') }}:
        - powershell: |
            git -C "$env:VCPKG_ROOT" fetch origin fa9a5b330aed997a68310ed56418617b87a3b83d
            if ($LASTEXITCODE -ne 0) { throw "Failed to fetch vcpkg baseline" }
          errorActionPreference: continue
          displayName: Fetch vcpkg baseline
      - ${{ if ne(parameters.agentOs, 'Windows') }}:
        - bash: |
            git -C "$VCPKG_ROOT" fetch origin fa9a5b330aed997a68310ed56418617b87a3b83d
          displayName: Fetch vcpkg baseline

      - task: CMake@1
        inputs:
          cmakeArgs: .. ${{ parameters.cMakeRunArgs }} -DCMAKE_BUILD_TYPE=${{ parameters.configuration }} -DUSE_CPPRESTSDK=${{ parameters.useCppRestSDK }} -DUSE_MSGPACK=true
          workingDirectory: 'build.${{ parameters.configuration }}'
        displayName: Create build files
      - task: CMake@1
        inputs:
          cmakeArgs: --build . --config ${{ parameters.configuration }}
          workingDirectory: 'build.${{ parameters.configuration }}'
        displayName: Build client
      - ${{ if eq(parameters.agentOs, 'macOS') }}:
        - bash: "./run-tests.sh ./build.${{ parameters.configuration }}/bin/signalrclienttests ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Darwin' )
          displayName: Run tests
      - ${{ if eq(parameters.agentOs, 'Linux') }}:
        - bash: "./run-tests.sh valgrind --leak-check=yes --leak-check=full --error-exitcode=1 --track-origins=yes ./build.${{ parameters.configuration }}/bin/signalrclienttests ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Linux' )
          displayName: Run tests
      - ${{ if eq(parameters.agentOs, 'Windows') }}:
        - powershell: "& ./build.${{ parameters.configuration }}/bin/${{ parameters.configuration }}/signalrclienttests.exe ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Windows_NT' )
          displayName: Run tests

      - ${{ parameters.afterBuild }}

      - task: PublishTestResults@2
        displayName: Publish test results
        condition: always()
        inputs:
          testRunner: junit
          testResultsFiles: '$(Build.ArtifactStagingDirectory)/testOut/**/*.xml'
          testRunTitle: ${{ parameters.agentOs }}-unit_test

- ${{ if eq(variables['System.TeamProject'], 'internal') }}:
  - template: /eng/common/templates-official/job/job.yml@self
    parameters:
      name: ${{ coalesce(parameters.jobName, parameters.agentOs) }}
      displayName: ${{ coalesce(parameters.jobName, parameters.agentOs) }}
      dependsOn: ${{ parameters.dependsOn }}
      timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
      enablePublishBuildAssets: false
      ${{ if and(eq(variables['System.TeamProject'], 'internal'), eq(parameters.agentOs, 'Windows')) }}:
        enablePublishUsingPipelines: ${{ variables._PublishUsingPipelines }}
      enablePublishTestResults: true # publish test results to AzDO (populates AzDO Tests tab)
      enableTelemetry: true
      pool:
        ${{ if eq(parameters.agentOs, 'macOS') }}:
          name: Azure Pipelines
          image: macOS-latest
          os: macOS
        ${{ if eq(parameters.agentOs, 'Linux') }}:
          name: $(DncEngInternalBuildPool)
          image: 1es-ubuntu-2204
          os: linux
        ${{ if eq(parameters.agentOs, 'Windows') }}:
          name: $(DncEngInternalBuildPool)
          image: 1es-windows-2022
          os: windows
      steps:
      - checkout: self
        clean: true

      - ${{ if eq(parameters.agentOs, 'Windows') }}:
        - script: eng\common\init-tools-native.cmd
          displayName: Install native dependencies

      - ${{ parameters.beforeBuild }}

      # The machine-provided vcpkg is a shallow clone that may not contain the
      # builtin-baseline pinned in vcpkg.json (cpprestsdk was deindexed from tip,
      # so we pin to the commit before its removal). Deepen the clone so manifest
      # restore can resolve the baseline and the removed port from history.
      - ${{ if eq(parameters.agentOs, 'Windows') }}:
        - powershell: |
            git -C "$env:VCPKG_ROOT" fetch origin fa9a5b330aed997a68310ed56418617b87a3b83d
            if ($LASTEXITCODE -ne 0) { throw "Failed to fetch vcpkg baseline" }
          errorActionPreference: continue
          displayName: Fetch vcpkg baseline
      - ${{ if ne(parameters.agentOs, 'Windows') }}:
        - bash: |
            git -C "$VCPKG_ROOT" fetch origin fa9a5b330aed997a68310ed56418617b87a3b83d
          displayName: Fetch vcpkg baseline

      - task: CMake@1
        inputs:
          cmakeArgs: .. ${{ parameters.cMakeRunArgs }} -DCMAKE_BUILD_TYPE=${{ parameters.configuration }} -DUSE_CPPRESTSDK=${{ parameters.useCppRestSDK }} -DUSE_MSGPACK=true
          workingDirectory: 'build.${{ parameters.configuration }}'
        displayName: Create build files
      - task: CMake@1
        inputs:
          cmakeArgs: --build . --config ${{ parameters.configuration }}
          workingDirectory: 'build.${{ parameters.configuration }}'
        displayName: Build client
      - ${{ if eq(parameters.agentOs, 'macOS') }}:
        - bash: "./run-tests.sh ./build.${{ parameters.configuration }}/bin/signalrclienttests ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Darwin' )
          displayName: Run tests
      - ${{ if eq(parameters.agentOs, 'Linux') }}:
        - bash: "./run-tests.sh valgrind --leak-check=yes --leak-check=full --error-exitcode=1 --track-origins=yes ./build.${{ parameters.configuration }}/bin/signalrclienttests ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Linux' )
          displayName: Run tests
      - ${{ if eq(parameters.agentOs, 'Windows') }}:
        - powershell: "& ./build.${{ parameters.configuration }}/bin/${{ parameters.configuration }}/signalrclienttests.exe ${{ parameters.gtestFlags }}"
          condition: eq( variables['Agent.OS'], 'Windows_NT' )
          displayName: Run tests

      - ${{ parameters.afterBuild }}

      - task: PublishTestResults@2
        displayName: Publish test results
        condition: always()
        inputs:
          testRunner: junit
          testResultsFiles: '$(Build.ArtifactStagingDirectory)/testOut/**/*.xml'
          testRunTitle: ${{ parameters.agentOs }}-unit_test
